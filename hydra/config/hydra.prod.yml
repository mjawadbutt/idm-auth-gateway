# Production Hydra config template
# Secrets are injected via environment variables by the entrypoint script.
# Set SECRETS_PROVIDER=aws|vault to control the secrets source.

serve:
  public:
    port: 4444
  admin:
    port: 4445
    host: 127.0.0.1  # admin port must never be exposed externally

dsn: ${HYDRA_DSN}  # e.g. postgres://user:pass@host:5432/hydra?sslmode=require

secrets:
  system:
    - ${HYDRA_SYSTEM_SECRET}
  cookie:
    - ${HYDRA_COOKIE_SECRET}

urls:
  self:
    issuer: ${HYDRA_ISSUER_URL}
  login: ${LOGIN_APP_URL}/login
  consent: ${CONSENT_APP_URL}/consent
  logout: ${LOGIN_APP_URL}/logout

oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      salt: ${HYDRA_PAIRWISE_SALT}

log:
  level: warn
  format: json
